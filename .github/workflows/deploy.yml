name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 构建前端静态文件 ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          CI: false
        run: |
          npm ci
          npm run build

      # ── 2. 配置 SSH ───────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── 3. 检测哪些部分发生了变化 ─────────────────────────────────
      - name: Detect changes
        id: changes
        run: |
          git fetch origin main --depth=2
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED"

          # 后端相关文件变了才需要重建镜像
          if echo "$CHANGED" | grep -qE '^(app/|app\.py|Dockerfile\.backend|requirements\.txt|docker-entrypoint\.sh|docker-compose\.yml|cmake-build-debug/)'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          # 前端静态文件（build产物）是否变化（只要运行了 npm run build 就有变化）
          echo "frontend=true" >> $GITHUB_OUTPUT

      # ── 4. 同步代码到服务器 ───────────────────────────────────────
      - name: Sync to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/src' \
            --exclude='frontend/public' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/tms/

      # ── 5a. 后端有变化：重建镜像并重启（利用 Docker 层缓存）────────
      - name: Rebuild backend (if changed)
        if: steps.changes.outputs.backend == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e
          cd /opt/tms

          # 利用层缓存重建（不加 --no-cache）
          docker compose build backend

          # 滚动重启：先起新容器再停旧容器，减少停机时间
          docker compose up -d --no-deps backend

          echo "等待后端就绪..."
          for i in $(seq 1 10); do
            sleep 5
            STATUS=$(docker inspect tms_backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            echo "[$i/10] 状态: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "后端已就绪"
              break
            fi
          done

          # 确保 nginx 也在线
          docker compose up -d nginx
          ENDSSH

      # ── 5b. 只有前端变化：确保 nginx 在线并 reload ───────────────
      - name: Reload nginx (frontend only)
        if: steps.changes.outputs.backend == 'false'
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /opt/tms && docker compose up -d nginx && docker exec tms_nginx nginx -s reload"

      # ── 6. 确认部署结果 ───────────────────────────────────────────
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /opt/tms && docker compose ps"
