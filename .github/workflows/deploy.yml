name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 构建前端静态文件 ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          CI: false        # 不把warning当error，避免旧依赖警告中断构建
        run: |
          npm ci
          npm run build

      # ── 2. 配置 SSH，用于后续 rsync 和远程命令 ────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── 3. 用 rsync 同步代码和前端产物到服务器 ────────────────────
      - name: Sync to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/src' \
            --exclude='frontend/public' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/tms/

      # ── 4. 服务器上重建并启动容器 ─────────────────────────────────
      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e
          cd /opt/tms

          docker compose down --remove-orphans
          docker compose build --no-cache backend
          docker compose up -d

          echo "等待服务启动..."
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(docker inspect tms_backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            echo "[$i/12] 状态: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "服务已就绪"
              break
            fi
          done

          docker compose ps
          ENDSSH
