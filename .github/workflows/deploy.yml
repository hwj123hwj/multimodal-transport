name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 构建前端静态文件 ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          CI: false
        run: |
          npm ci
          npm run build

      # ── 2. 配置 SSH ───────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── 3. 检测哪些部分发生了变化 ─────────────────────────────────
      - name: Detect changes
        id: changes
        run: |
          git fetch origin main --depth=2
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED"

          # 需要重建镜像的条件：Dockerfile 或依赖文件或 exe 本身变了
          if echo "$CHANGED" | grep -qE '^(Dockerfile\.backend|requirements\.txt|docker-entrypoint\.sh|docker-compose\.yml|cmake-build-debug/stable_match\.exe)'; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild=false" >> $GITHUB_OUTPUT
          fi

          # 后端 Python 代码是否变化
          if echo "$CHANGED" | grep -qE '^(app/|app\.py)'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

      # ── 4. 同步代码到服务器（排除运行时数据，避免覆盖用户数据）────
      - name: Sync to server
        run: |
          echo "=== 开始同步代码到服务器 ==="
          echo "检查 build 目录是否存在:"
          ls -la frontend/build/ || echo "build 目录不存在！"

          rsync -azv --delete \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/src' \
            --exclude='frontend/public' \
            --exclude='data/' \
            --exclude='cmake-build-debug/result/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/tms/

          echo "=== 同步完成 ==="
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -la /opt/tms/frontend/build/ || echo '服务器上 build 目录不存在'"

      # ── 5a. Dockerfile 等基础文件变了：重建镜像并滚动重启 ─────────
      - name: Rebuild backend image (if needed)
        if: steps.changes.outputs.rebuild == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e
          cd /opt/tms
          docker compose build backend
          docker compose up -d --no-deps backend

          echo "等待后端就绪..."
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(docker inspect tms_backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            echo "[$i/12] 状态: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "后端已就绪"
              break
            fi
          done
          ENDSSH

      # ── 5b. 只有 Python 代码变化：直接 cp 进容器后重启，跳过镜像重建
      - name: Hot-update backend code (if changed, no rebuild)
        if: steps.changes.outputs.rebuild == 'false' && steps.changes.outputs.backend == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e
          docker cp /opt/tms/app/. tms_backend:/app/app/
          docker cp /opt/tms/app.py tms_backend:/app/app.py
          docker restart tms_backend

          echo "等待后端就绪..."
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(docker inspect tms_backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            echo "[$i/12] 状态: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "后端已就绪"
              break
            fi
          done
          ENDSSH

      # ── 6. 刷新 nginx（前端 build 产物已由 rsync 同步）────────────
      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /opt/tms && docker compose up -d nginx && docker exec tms_nginx nginx -s reload"

      # ── 7. 确认部署结果 ───────────────────────────────────────────
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /opt/tms && docker compose ps && curl -sf http://localhost/ > /dev/null && echo 'HTTP OK'"
