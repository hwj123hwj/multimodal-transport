version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: expe_backend
    expose:
      - "8000"
    environment:
      - PORT=8000
      - DEBUG=false
      - DATA_DIR=/app/data
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - expe_network

  nginx:
    image: nginx:alpine
    container_name: expe_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx-complete.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - expe_network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-data:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email your-email@example.com --agree-tos --no-eff-email -d your-domain.com

networks:
  expe_network:
    driver: bridge

volumes:
  certbot-data:
  certbot-conf: