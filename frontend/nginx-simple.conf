# 简化版Nginx配置 - 专用于expe_frontend项目
# 适用于Windows本地开发环境

server {
    listen 80;
    server_name localhost;
    
    # 日志配置
    access_log D:/develop/deploy/nginx-1.28.0/logs/access.log;
    error_log D:/develop/deploy/nginx-1.28.0/logs/error.log;
    
    # 前端静态文件服务
    location / {
        root D:/develop/deploy/nginx-1.28.0/html/expe-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 开发环境禁用缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # API代理 - 所有/api/开头的请求转发到后端
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS支持
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        
        # 预检请求处理
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # 后端文档服务
    location /docs {
        proxy_pass http://localhost:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 静态资源优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }
    
    # Gzip压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}