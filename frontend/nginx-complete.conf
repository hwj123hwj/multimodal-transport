# 完整的Nginx配置文件 - 适用于expe_frontend项目
# 复制此内容到 D:\develop\deploy\nginx-1.28.0\conf\nginx.conf

events {
    worker_connections 1024;
}

http {
    include       D:/develop/deploy/nginx-1.28.0/conf/mime.types;
    default_type  application/octet-stream;
    
    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log  D:/develop/deploy/nginx-1.28.0/logs/access.log  main;
    
    # 基本设置
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    
    # 性能优化
    worker_processes auto;  # 自动检测CPU核心数
    worker_rlimit_nofile 65535;
    
    # 连接优化
    keepalive_requests 10000;
    client_header_timeout 3s;
    client_body_timeout 3s;
    send_timeout 3s;
    
    # Gzip压缩
    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    
    # 上游服务器配置
    upstream backend {
        server localhost:8000;
        keepalive 32;  # 保持连接池
        keepalive_requests 1000;  # 单个连接最大请求数
        keepalive_timeout 60s;  # 连接超时时间
    }
    
    # 服务器配置
    server {
        listen       80;
        server_name  localhost;
        
        # 前端静态文件服务
        location / {
            root   D:/develop/deploy/nginx-1.28.0/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
            
            # 开发环境禁用缓存
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # API代理 - 所有/api/开头的请求转发到后端
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 连接池优化
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # CORS支持
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            
            # 预检请求处理
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            
            # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # 缓冲区优化
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
        
        # 后端文档服务
        location /docs {
            proxy_pass http://localhost:8000/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        location /redoc {
            proxy_pass http://localhost:8000/redoc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        location /openapi.json {
            proxy_pass http://localhost:8000/openapi.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 静态资源优化
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            gzip_static on;
        }
        
        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}