services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tms_backend
    expose:
      - "8000"
    environment:
      - PORT=8000
      - DEBUG=false
      - DATA_DIR=/app/data
    restart: unless-stopped
    networks:
      - tms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: tms_nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx-docker.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tms_network

networks:
  tms_network:
    driver: bridge
