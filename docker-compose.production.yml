version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: expe_backend_prod
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DEBUG=false
      - DATA_DIR=/app/data
      - SHIPMENT_FILE=shipment.csv
      - ROUTE_FILE=route.csv
      - MATCHING_FILE=stable_matching.csv
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - expe_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: expe_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx-docker.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - expe_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  # 可选：Redis缓存
  redis:
    image: redis:7-alpine
    container_name: expe_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - expe_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

networks:
  expe_network:
    driver: bridge

volumes:
  redis_data:
    driver: local