version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: expe-backend-prod
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DEBUG=false
      - DATA_DIR=/app/data
    volumes:
      - expe-data:/app/data
      - expe-logs:/app/logs
    networks:
      - expe-network-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - NODE_ENV=production
    container_name: expe-frontend-prod
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:8000
      - REACT_APP_ENV=production
    depends_on:
      - backend
    networks:
      - expe-network-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Nginx反向代理
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.nginx
    container_name: expe-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - expe-logs:/var/log/nginx
      - nginx-cache:/var/cache/nginx
    networks:
      - expe-network-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

networks:
  expe-network-prod:
    driver: bridge

volumes:
  expe-data:
    driver: local
  expe-logs:
    driver: local
  nginx-cache:
    driver: local